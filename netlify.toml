[build]
  publish = "."
  functions = "netlify/functions"

[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "DENY"
    Cross-Origin-Opener-Policy = "same-origin"
    Cross-Origin-Resource-Policy = "same-origin"
    X-Permitted-Cross-Domain-Policies = "none"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "accelerometer=(), ambient-light-sensor=(), autoplay=(), battery=(), camera=(), display-capture=(), document-domain=(), encrypted-media=(), fullscreen=(self), gamepad=(), geolocation=(), gyroscope=(), hid=(), idle-detection=(), local-fonts=(), magnetometer=(), microphone=(), midi=(), otp-credentials=(), payment=(), picture-in-picture=(), publickey-credentials-get=(), screen-wake-lock=(), serial=(), sync-xhr=(), usb=(), web-share=(), xr-spatial-tracking=()"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://googletagmanager.com https://*.googletagmanager.com https://google-analytics.com https://*.google-analytics.com https://analytics.google.com https://*.analytics.google.com https://*.g.doubleclick.net https://*.googleadservices.com https://www.gstatic.com https://static.cloudflareinsights.com; script-src-elem 'self' 'unsafe-inline' https://googletagmanager.com https://*.googletagmanager.com https://google-analytics.com https://*.google-analytics.com https://analytics.google.com https://*.analytics.google.com https://*.g.doubleclick.net https://*.googleadservices.com https://www.gstatic.com https://static.cloudflareinsights.com; style-src 'self' 'unsafe-inline' https:; img-src 'self' data: blob: https: https://googletagmanager.com https://*.googletagmanager.com https://google-analytics.com https://*.google-analytics.com https://analytics.google.com https://*.analytics.google.com https://*.g.doubleclick.net https://*.googleadservices.com https://www.gstatic.com https://static.cloudflareinsights.com; font-src 'self' https: data:; connect-src 'self' https://wa.me https://googletagmanager.com https://*.googletagmanager.com https://google-analytics.com https://*.google-analytics.com https://analytics.google.com https://*.analytics.google.com https://*.g.doubleclick.net https://*.googleadservices.com https://www.google.com https://*.google.com https://www.gstatic.com https://static.cloudflareinsights.com https://cloudflareinsights.com; frame-src 'self' https://googletagmanager.com https://*.googletagmanager.com https://www.google.com https://*.google.com https://wa.me; object-src 'none'; base-uri 'self'; frame-ancestors 'none'; form-action 'self' https://wa.me; upgrade-insecure-requests;"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.png"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.PNG"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.jpg"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.svg"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.mp4"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/.netlify/functions/*"
  [headers.values]
    Cache-Control = "no-store"

[[redirects]]
  from = "/traditional-kuzhalappam.html"
  to = "/traditional-kuzhalappam/"
  status = 301

[[redirects]]
  from = "/spicy-kuzhalappam.html"
  to = "/spicy-kuzhalappam/"
  status = 301

[[redirects]]
  from = "/sweet-kuzhalappam.html"
  to = "/sweet-kuzhalappam/"
  status = 301

[[redirects]]
  from = "/thatta.html"
  to = "/thatta/"
  status = 301

[[redirects]]
  from = "/kerala-snacks-guide.html"
  to = "/blog/kerala-snacks/"
  status = 301
