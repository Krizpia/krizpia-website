[build]
  publish = "."
  functions = "netlify/functions"

[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "DENY"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), payment=()"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    Content-Security-Policy = "default-src 'self'; base-uri 'self'; object-src 'none'; frame-ancestors 'none'; img-src 'self' data: https://lh3.googleusercontent.com https://*.googleusercontent.com https://www.google-analytics.com https://*.google-analytics.com https://stats.g.doubleclick.net; script-src 'self' 'unsafe-inline' https://www.googletagmanager.com https://www.google-analytics.com; style-src 'self' 'unsafe-inline'; connect-src 'self' https://www.google-analytics.com https://*.google-analytics.com https://stats.g.doubleclick.net; frame-src https://www.googletagmanager.com; form-action 'self'; upgrade-insecure-requests"

[[headers]]
  for = "/.netlify/functions/*"
  [headers.values]
    Cache-Control = "no-store"

[[redirects]]
  from = "/traditional-kuzhalappam.html"
  to = "/traditional-kuzhalappam/"
  status = 301

[[redirects]]
  from = "/spicy-kuzhalappam.html"
  to = "/spicy-kuzhalappam/"
  status = 301

[[redirects]]
  from = "/sweet-kuzhalappam.html"
  to = "/sweet-kuzhalappam/"
  status = 301

[[redirects]]
  from = "/thatta.html"
  to = "/thatta/"
  status = 301

[[redirects]]
  from = "/kerala-snacks-guide.html"
  to = "/blog/kerala-snacks/"
  status = 301
