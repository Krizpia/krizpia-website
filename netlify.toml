[build]
  publish = "."

[[headers]]
  for = "/*"
  [headers.values]
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "DENY"
    Cross-Origin-Opener-Policy = "same-origin"
    Cross-Origin-Resource-Policy = "same-origin"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://www.googletagmanager.com https://consent.cookiebot.com; script-src-elem 'self' 'unsafe-inline' https://www.googletagmanager.com https://consent.cookiebot.com; style-src 'self' 'unsafe-inline' https://tagmanager.google.com; img-src 'self' data: blob: https:; font-src 'self' data:; connect-src 'self' https://consent.cookiebot.com https://consentcdn.cookiebot.com https://www.googletagmanager.com https://www.google-analytics.com https://analytics.google.com https://region1.google-analytics.com https://stats.g.doubleclick.net; frame-src 'self' https://www.googletagmanager.com https://consent.cookiebot.com https://consentcdn.cookiebot.com; object-src 'none'; base-uri 'self'; frame-ancestors 'none'; form-action 'self' https://wa.me mailto:; upgrade-insecure-requests;"

[[redirects]]
  from = "https://www.krizpia.com/*"
  to = "https://krizpia.com/:splat"
  status = 301
  force = true

[[redirects]]
  from = "http://krizpia.com/*"
  to = "https://krizpia.com/:splat"
  status = 301
  force = true

[[redirects]]
  from = "http://www.krizpia.com/*"
  to = "https://krizpia.com/:splat"
  status = 301
  force = true

# Keep confidential Thatta launch pages unavailable until the product is public.
[[redirects]]
  from = "/thatta"
  to = "/404.html"
  status = 404
  force = true

[[redirects]]
  from = "/thatta/*"
  to = "/404.html"
  status = 404
  force = true

[[redirects]]
  from = "/thatta-guide.html"
  to = "/404.html"
  status = 404
  force = true

[[redirects]]
  from = "/scheduled-blogs/05-blog-thatta.html"
  to = "/404.html"
  status = 404
  force = true

# Consolidate overlapping Kuzhalappam articles into the educational guide.
[[redirects]]
  from = "/blog-traditional-kuzhalappam.html"
  to = "/traditional-kuzhalappam-guide.html"
  status = 301
  force = true

[[redirects]]
  from = "/scheduled-blogs/01-blog-Traditional Kuzhalappam.html"
  to = "/traditional-kuzhalappam-guide.html"
  status = 301
  force = true

[[redirects]]
  from = "/scheduled-blogs/01-blog-Traditional%20Kuzhalappam.html"
  to = "/traditional-kuzhalappam-guide.html"
  status = 301
  force = true

# Keep legacy numbered article URLs away from search results with clean permanent targets.
[[redirects]]
  from = "/scheduled-blogs/04-blog-06-blog-kerala-snacks-guide.html"
  to = "/kerala-snacks-guide.html"
  status = 301
  force = true

[[redirects]]
  from = "/scheduled-blogs/05-blog-07-blog-tea-time-snacks.html"
  to = "/scheduled-blogs/kerala-snacks-that-pair-with-tea-coffee.html"
  status = 301
  force = true

[[redirects]]
  from = "/scheduled-blogs/06-blog-08-blog-rice-flour-snacks.html"
  to = "/rice-flour-snacks.html"
  status = 301
  force = true

[[headers]]
  for = "/*.png"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.PNG"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.jpg"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.jpeg"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
