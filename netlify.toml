[build]
  publish = "."
  functions = "netlify/functions"

[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "DENY"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), payment=()"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://www.googletagmanager.com https://www.google-analytics.com https://static.cloudflareinsights.com; style-src 'self' 'unsafe-inline'; img-src 'self' data: https: https://www.google-analytics.com https://www.googletagmanager.com https://stats.g.doubleclick.net; font-src 'self' https: data:; connect-src 'self' https://wa.me https://www.google-analytics.com https://region1.google-analytics.com https://analytics.google.com https://stats.g.doubleclick.net https://www.googletagmanager.com; frame-src 'self' https://www.googletagmanager.com; object-src 'none'; base-uri 'self'; frame-ancestors 'self'; form-action 'self'; upgrade-insecure-requests;"

[[headers]]
  for = "/.netlify/functions/*"
  [headers.values]
    Cache-Control = "no-store"

[[redirects]]
  from = "/traditional-kuzhalappam.html"
  to = "/traditional-kuzhalappam/"
  status = 301

[[redirects]]
  from = "/spicy-kuzhalappam.html"
  to = "/spicy-kuzhalappam/"
  status = 301

[[redirects]]
  from = "/sweet-kuzhalappam.html"
  to = "/sweet-kuzhalappam/"
  status = 301

[[redirects]]
  from = "/thatta.html"
  to = "/thatta/"
  status = 301

[[redirects]]
  from = "/kerala-snacks-guide.html"
  to = "/blog/kerala-snacks/"
  status = 301
